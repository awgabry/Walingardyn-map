<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mapa Interativo 3D - Explorador</title>
    <style>
        body { margin: 0; background-color: #00050a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* HUD Superior Estilo LoL */
        .hud {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 15px;
            border-left: 3px solid #c89b3c;
            color: white;
            background: rgba(1, 10, 19, 0.7);
            pointer-events: none;
            z-index: 10;
        }
        .hud h1 { margin: 0; font-size: 1.5rem; letter-spacing: 3px; color: #c89b3c; }
        
        /* Overlay de Vinheta */
        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.9);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="hud">
        <h1>MAPA DE RUNETERRA</h1>
        <p>EXPLORAÇÃO DE TERRITÓRIO</p>
    </div>
    <div class="vignette"></div>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x00050a);
        scene.fog = new THREE.FogExp2(0x00050a, 0.015); // Névoa que esconde as bordas

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping; // Melhora as cores
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Luzes
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xfff5d7, 2);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // Controles (Damping faz o deslize suave do Google Maps)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.2; // Evita ver por baixo

        // CARREGAMENTO DO MAPA
        const loader = new GLTFLoader();
        // IMPORTANTE: O nome do arquivo abaixo deve ser IGUAL ao que está na pasta
        loader.load('Map 3D site.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);
            
            // Centralização automática
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
        }, (xhr) => {
            console.log((xhr.loaded / xhr.total * 100) + '% carregado');
        }, (error) => {
            console.error('Erro ao carregar o arquivo na pasta:', error);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
